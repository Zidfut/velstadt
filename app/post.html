    <main class="main inner-page">
        <div class="section">
            <div class="container inner-page__container">
                <div class="page-post">
                    <div class="page-post__shares">
                        <ul>
                            <li>
                                <a href="#">
                                    <span style="mask: url('images/dist/socials/link.svg') no-repeat center;"></span>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <span style="mask: url('images/dist/socials/fb.svg') no-repeat center;"></span>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <span style="mask: url('images/dist/socials/x.svg') no-repeat center;"></span>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <span style="mask: url('images/dist/socials/ig.svg') no-repeat center;"></span>
                                </a>
                            </li>
                        </ul>
                    </div>
                    <div class="page-post__content">
                        <div class="page-post__details">
                            <span class="page-post__details-item">136 views</span>
                        </div>
                    </div>
                    <div class="page-post__sidebar">
                        <div class="page-post__form">
                            <div class="cta__form">
                                <h3 class="cta__form-title">Get in touch</h3>
                                <div class="cta__form-row">
                                    <div class="cta__form-item">
                                        <label class="cta__form-label">Full Name</label>
                                        <input class="cta__form-input" type="text" placeholder="John Doe">
                                    </div>
                                </div>
                                <div class="cta__form-row">
                                    <div class="cta__form-item">
                                        <label class="cta__form-label">Email</label>
                                        <input class="cta__form-input" type="email" placeholder="hello@velstadt.com">
                                    </div>
                                </div>
                                <div class="cta__form-row">
                                    <div class="cta__form-item">
                                        <label class="cta__form-label">How can we help?</label>
                                        <textarea class="cta__form-textarea" placeholder="Tell us about your security needs"></textarea>
                                    </div>
                                </div>
                                <div class="cta__form-row">
                                    <label class="cta__form-accept">
                                        <div class="checkbox__container">
                                            <input type="checkbox">
                                            <span class="checkmark"></span>
                                        </div>
                                        <span>I agree to the <a href="#">Privacy Policy</a>.</span>
                                    </label>
                                </div>
                                <div class="cta__form-row">
                                    <button class="cta__form-btn btn btn-primary">Get in touch</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

<!--#include virtual="/parts/footer.html" -->
